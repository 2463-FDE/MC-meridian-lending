name: meridian-lending

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-meridian}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set — copy .env.example to .env and set it (no committed default; see docs/security-remediation-2026-07.md)}
      POSTGRES_DB: ${POSTGRES_DB:-meridian}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-meridian} -d ${POSTGRES_DB:-meridian}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  origination-service:
    build: ./services/origination-service
    env_file: .env
    environment:
      # LLM credential is injected from the HOST shell at `compose up` time and
      # is NOT written into the committed .env. If unset it stays empty here; the
      # app fails loud (load_llm_config raises LLMConfigError) when the LLM
      # feature is enabled. Never add CLAUDE_API_KEY (or AWS Bedrock creds) to
      # the committed .env — put them in your shell or an untracked .env.local.
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      # provider=bedrock routes through Amazon Bedrock instead; AWS creds only
      # (same host-env-only rule — never write these into the committed .env).
      CLAUDE_PROVIDER: ${CLAUDE_PROVIDER:-anthropic}
      AWS_REGION: ${AWS_REGION:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_BEARER_TOKEN_BEDROCK: ${AWS_BEARER_TOKEN_BEDROCK:-}
      # LangSmith tracing — opt-in, no-op unless LANGSMITH_TRACING=true. Key is
      # host-env-only, same rule as CLAUDE_API_KEY above.
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-2463-FDE}
    # Internal-only (PR review): NOT host-published. The gateway (:8000) is the sole
    # trust boundary — downstream services trust the forwarded X-User-Role/X-User-Id,
    # so a direct host hit on this port would let a caller forge officer identity and
    # bypass the assistant's officer gate. Reachable service-to-service by name on the
    # compose network; `expose` documents the container port without publishing it.
    expose:
      - "8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./policies:/app/policies:ro
      - ./kb_dump:/app/kb_dump:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8001/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5

  servicing-service:
    build: ./services/servicing-service
    env_file: .env
    # Internal-only — gateway is the sole trust boundary (see origination-service).
    expose:
      - "8002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./db/settlement.csv:/app/data/settlement.csv:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8002/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5

  kyc-service:
    build: ./services/kyc-service
    env_file: .env
    # Internal-only — gateway is the sole trust boundary (see origination-service).
    expose:
      - "8003"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8003/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5

  decision-service:
    build: ./services/decision-service
    env_file: .env
    # Internal-only — gateway is the sole trust boundary (see origination-service).
    expose:
      - "8004"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8004/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5

  disclosure-service:
    build: ./services/disclosure-service
    env_file: .env
    # Internal-only — gateway is the sole trust boundary (see origination-service).
    expose:
      - "8005"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./policies:/app/policies:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8005/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5

  payment-service:
    build: ./services/payment-service
    env_file: .env
    # Internal-only — gateway is the sole trust boundary (see origination-service).
    expose:
      - "8006"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      servicing-service:
        condition: service_started
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8006/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build: ./services/gateway
    env_file: .env
    environment:
      # Resume cookie Secure flag. Defaults to true (PR #7 review): a compose-based real deploy
      # that does not set COOKIE_SECURE inherits the Secure default, so the resume-session
      # capability is never sent over plain HTTP. The local http demo relaxes it explicitly in
      # docker-compose.demo.yml (or export COOKIE_SECURE=false), NOT here in the base file.
      COOKIE_SECURE: "${COOKIE_SECURE:-true}"
      # Browser origin allowed to send credentialed (cookie) resume requests. Credentialed CORS
      # rejects any other origin, so a real deploy MUST set its portal origin (via .env / host
      # env) -- pinning localhost here would make CORS reject the deployed portal, breaking
      # resume from submit through decision/offer/accept (PR #7 review). Pass the deployment
      # value through, defaulting to localhost only when unset (local dev).
      PORTAL_ORIGIN: "${PORTAL_ORIGIN:-http://localhost:3000}"
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      origination-service:
        condition: service_started
      servicing-service:
        condition: service_started
      kyc-service:
        condition: service_started
      decision-service:
        condition: service_started
      disclosure-service:
        condition: service_started
      payment-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_GATEWAY_URL: http://localhost:8000
      GATEWAY_URL: http://gateway:8000
    ports:
      - "3000:3000"
    depends_on:
      - gateway

volumes:
  pgdata:
